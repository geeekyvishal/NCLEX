name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  node-ci:
    name: Node.js (Lint, Build/Typecheck, Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build and Typecheck (Domain and API)
        run: npm run build

      - name: Run API Tests
        run: npm run test

  python-ci:
    name: Python (Unit Tests, Card Quality Evals)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/ai-worker/requirements.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/ai-worker/requirements.txt

      - name: Run Python unit tests
        run: |
          cd apps/ai-worker
          PYTHONPATH=. pytest
        env:
          DATABASE_URL: "postgres://nclex:nclex@localhost:5432/nclex"
          REDIS_URL: "redis://localhost:6379"

      - name: Run Card Quality Evaluations
        run: |
          PYTHONPATH=apps/ai-worker python evals/run_evals.py --mock
        env:
          DATABASE_URL: "postgres://nclex:nclex@localhost:5432/nclex"
          REDIS_URL: "redis://localhost:6379"
