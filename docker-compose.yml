# Local infra for the demo-path backend.
# Postgres (with pgvector), Redis, and MinIO (S3-compatible object storage).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nclex
      POSTGRES_PASSWORD: nclex
      POSTGRES_DB: nclex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nclex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nclex
      MINIO_ROOT_PASSWORD: nclexsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
